                        <div class="hidden md:block h-full w-full relative group cursor-pointer" onclick="openGallery(2)">
                            <img src="${activeGalleryImages[2] || activeGalleryImages[0]}" class="w-full h-full object-cover group-hover:brightness-75 transition duration-300">
                        </div>
                        <div class="hidden md:block h-full w-full relative group cursor-pointer" onclick="openGallery(3)">
                            <img src="${activeGalleryImages[3] || activeGalleryImages[0]}" class="w-full h-full object-cover group-hover:brightness-75 transition duration-300">
                        </div>
                        <div class="hidden md:block h-full w-full relative group cursor-pointer" onclick="openGallery(4)">
                            <img src="${activeGalleryImages[4] || activeGalleryImages[0]}" class="w-full h-full object-cover group-hover:brightness-75 transition duration-300">
                        </div>

                        <!-- View All Photos Button -->
                        <button onclick="openGallery(0)" class="absolute bottom-6 right-6 bg-white text-black px-4 py-2 rounded-lg font-semibold text-sm shadow-lg hover:bg-gray-200 transition flex items-center gap-2">
                            <i class="fa-solid fa-images"></i> Show all photos
                        </button>
                    </div>
                </div>

                <!-- Main Details Layout -->
                <div class="max-w-7xl mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-3 gap-12">
                    
                    <!-- Left Column: Info & Amenities -->
                    <div class="lg:col-span-2 space-y-12">
                        
                        ${specialOfferBadge}

                        <div>
                            <h3 class="serif text-2xl text-[#d4af37] mb-4 border-b border-gray-800 pb-2">About The Property</h3>
                            <p class="text-gray-300 leading-relaxed">${currentVilla.desc || fallbackDesc}</p>
                        </div>

                        <div>
                            <h3 class="serif text-2xl text-[#d4af37] mb-6 border-b border-gray-800 pb-2">Premium Amenities</h3>
                            <div class="grid grid-cols-2 md:grid-cols-3 gap-y-6 gap-x-4">
                                <div class="flex items-center gap-3 text-gray-300"><i class="fa-solid fa-water text-[#d4af37] text-xl w-6"></i> Private Pool</div>
                                <div class="flex items-center gap-3 text-gray-300"><i class="fa-solid fa-snowflake text-[#d4af37] text-xl w-6"></i> Air Conditioning</div>
                                <div class="flex items-center gap-3 text-gray-300"><i class="fa-solid fa-wifi text-[#d4af37] text-xl w-6"></i> High-Speed WiFi</div>
                                <div class="flex items-center gap-3 text-gray-300"><i class="fa-solid fa-tv text-[#d4af37] text-xl w-6"></i> Smart TV & Audio</div>
                                <div class="flex items-center gap-3 text-gray-300"><i class="fa-solid fa-gamepad text-[#d4af37] text-xl w-6"></i> Indoor Games</div>
                                <div class="flex items-center gap-3 text-gray-300"><i class="fa-solid fa-utensils text-[#d4af37] text-xl w-6"></i> Chef on Request</div>
                                <div class="flex items-center gap-3 text-gray-300"><i class="fa-solid fa-car text-[#d4af37] text-xl w-6"></i> Secure Parking</div>
                                <div class="flex items-center gap-3 text-gray-300"><i class="fa-solid fa-bolt text-[#d4af37] text-xl w-6"></i> Power Backup</div>
                                <div class="flex items-center gap-3 text-gray-300"><i class="fa-solid fa-fire-burner text-[#d4af37] text-xl w-6"></i> BBQ Setup</div>
                            </div>
                        </div>

                        <div>
                            <h3 class="serif text-2xl text-[#d4af37] mb-4 border-b border-gray-800 pb-2">Property Policies</h3>
                            <ul class="space-y-3 text-gray-400 text-sm">
                                <li><i class="fa-solid fa-clock text-[#d4af37] mr-2"></i> Check-in: 1:00 PM | Check-out: 11:00 AM</li>
                                <li><i class="fa-solid fa-id-card text-[#d4af37] mr-2"></i> Valid Government ID required for all guests.</li>
                                <li><i class="fa-solid fa-shield-halved text-[#d4af37] mr-2"></i> Security Deposit: ₹7,000 (Refundable)</li>
                            </ul>
                        </div>
                    </div>

                    <!-- Right Column: Sticky Booking Card -->
                    <div class="lg:col-span-1 relative">
                        <div class="glass-card rounded-2xl p-6 md:p-8 sticky top-32 shadow-2xl">
                            <div class="border-b border-gray-700 pb-6 mb-6">
                                ${priceDisplay}
                            </div>
                            
                            <p class="text-xs text-gray-400 mb-6 text-center italic">To secure this property or inquire about availability, contact our concierge directly.</p>
                            
                            <a href="https://wa.me/918806200139?text=Hello Blossom Stay! I am interested in booking the ${currentVilla.title}." target="_blank" 
                               class="block w-full bg-[#25D366] hover:bg-[#1ebe5d] text-white text-center font-bold py-4 rounded-lg transition duration-300 shadow-lg mb-4 flex items-center justify-center gap-3">
                                <i class="fa-brands fa-whatsapp text-2xl"></i> Chat on WhatsApp
                            </a>
                            
                            <a href="tel:+918806200139" 
                               class="block w-full bg-transparent border border-[#d4af37] text-[#d4af37] hover:bg-[#d4af37] hover:text-black text-center font-bold py-3 rounded-lg transition duration-300 uppercase tracking-widest text-xs flex items-center justify-center gap-2">
                                <i class="fa-solid fa-phone"></i> Call Concierge
                            </a>
                        </div>
                    </div>

                </div>
            `;
        } else {
            mainContent.innerHTML = `
                <div class="flex flex-col items-center justify-center h-[60vh] text-center px-4">
                    <i class="fa-solid fa-house-chimney-crack text-6xl text-gray-700 mb-6"></i>
                    <h2 class="serif text-3xl text-white mb-4">Villa Not Found</h2>
                    <p class="text-gray-400 mb-8 max-w-md">The property you are looking for might have been removed or the link is invalid.</p>
                    <a href="villa-list.html" class="bg-[#d4af37] text-black px-8 py-3 font-bold uppercase tracking-widest text-xs rounded hover:bg-yellow-500 transition">Browse Collection</a>
                </div>
            `;
        }

        // ================= GALLERY LOGIC =================
        
        function openGallery(index = 0) {
            currentImageIndex = index;
            updateModalImage();
            galleryModal.classList.remove('hidden');
            galleryModal.classList.add('flex');
            document.body.style.overflow = 'hidden'; // Stop background scrolling
        }

        function closeGallery() {
            galleryModal.classList.add('hidden');
            galleryModal.classList.remove('flex');
            document.body.style.overflow = 'auto'; // Restore background scrolling
        }

        function changeImage(step) {
            currentImageIndex += step;
            // Loop back to start/end
            if (currentImageIndex >= activeGalleryImages.length) {
                currentImageIndex = 0;
            } else if (currentImageIndex < 0) {
                currentImageIndex = activeGalleryImages.length - 1;
            }
            updateModalImage();
        }

        function updateModalImage() {
            // Add a small fade effect
            modalMainImage.style.opacity = 0;
            setTimeout(() => {
                modalMainImage.src = activeGalleryImages[currentImageIndex];
                galleryCount.innerText = `${currentImageIndex + 1} / ${activeGalleryImages.length}`;
                modalMainImage.style.opacity = 1;
            }, 150);
        }

        // Keyboard controls for gallery
        document.addEventListener('keydown', (e) => {
            if (!galleryModal.classList.contains('hidden')) {
                if (e.key === 'ArrowRight') changeImage(1);
                if (e.key === 'ArrowLeft') changeImage(-1);
                if (e.key === 'Escape') closeGallery();
            }
        });

    </script>
</body>
</html>
